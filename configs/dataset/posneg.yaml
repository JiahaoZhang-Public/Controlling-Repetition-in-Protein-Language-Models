# configs/dataset/posneg.yaml

_target_: replm.datasets.posneg_provider.PosNegProvider

# Seed used for shuffling and reproducibility.
seed: 42

pos_fasta: data/pos/uniprot.fa
pos_metrics: data/pos/uniprot.metrics.csv

neg_fasta: data/neg/esm3_raw_neg.sequences.fasta
neg_metrics: data/neg/esm3_raw_neg.metrics.csv

# Map dataset-specific column names to the canonical repetition/utility fields.
metrics:
  repetition: ["entropy_norm"] # key for repetition metric
  utility: ["ptm"] # key for utility metric
  entropy: ["entropy_norm", "H_norm"] # this is used to filter the dataset
  plddt: ["plddt_mean_0_100", "plddt", "plddt_mean_01"] # this is used to filter the dataset

filter:
  ent_hi: 0.90
  ent_lo: 0.80
  plddt_hi: 85.0
  min_len: 50
  max_len: 1024

opt:
  method: pareto        # choose from: pareto | composite | random | simple
  target_per_side: 1000
  random_seed: 42